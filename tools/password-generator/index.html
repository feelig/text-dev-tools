<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator - Free Online Developer Tool</title>
  <meta
    name="description"
    content="Generate random passwords instantly with this free online password generator. Choose length, uppercase, lowercase, numbers, and symbols."
  />
  <meta name="robots" content="index,follow" />
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #16202a;
      --muted: #5c6773;
      --border: #d9e0e7;
      --primary: #1463ff;
      --primary-hover: #0f52d6;
      --success: #137333;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .container {
      width: min(1000px, calc(100% - 32px));
      margin: 0 auto;
    }
    .site-header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: #fff;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
    }
    .breadcrumb {
      font-size: 14px;
      color: var(--muted);
      margin: 20px 0 8px;
    }
    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    .hero {
      padding: 12px 0 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
    }
    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input[type="number"], input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20, 99, 255, 0.12);
    }
    .checkbox-list {
      display: grid;
      gap: 10px;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #31404f;
    }
    .password-output {
      width: 100%;
      min-height: 120px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
      background: #fbfcfe;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    .btn-secondary {
      background: #eef3f8;
      color: var(--text);
    }
    .btn-secondary:hover {
      background: #e3ebf4;
    }
    .status {
      margin-top: 12px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    .status.success {
      color: var(--success);
      font-weight: 700;
    }
    .ad-slot {
      display: grid;
      place-items: center;
      min-height: 120px;
      border: 1px dashed #b9c6d3;
      border-radius: 14px;
      color: #7a8794;
      font-size: 14px;
      background: #fbfcfe;
    }
    .site-footer {
      padding: 28px 0 50px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 860px) {
      .controls-grid {
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">Text Dev Tools</a>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumb">
      <a href="/">Home</a> / <a href="/developer-tools/">Developer Tools</a> / Password Generator
    </div>

    <section class="hero">
      <h1>Password Generator</h1>
      <p>
        Generate strong random passwords in your browser. Choose the length and character types you want, then copy the result instantly.
      </p>
    </section>

    <section class="grid">
      <div class="ad-slot">Top Ad Slot</div>

      <div class="card">
        <div class="controls-grid">
          <div>
            <div class="field">
              <label for="lengthInput">Password Length</label>
              <input id="lengthInput" type="number" min="4" max="128" value="16" />
            </div>

            <div class="checkbox-list">
              <label class="check"><input id="upperCheck" type="checkbox" checked /> Include uppercase letters</label>
              <label class="check"><input id="lowerCheck" type="checkbox" checked /> Include lowercase letters</label>
              <label class="check"><input id="numberCheck" type="checkbox" checked /> Include numbers</label>
              <label class="check"><input id="symbolCheck" type="checkbox" checked /> Include symbols</label>
            </div>

            <div class="actions">
              <button class="btn-primary" id="generateBtn">Generate Password</button>
              <button class="btn-secondary" id="clearBtn">Clear</button>
            </div>
          </div>

          <div>
            <label>Generated Password</label>
            <div id="outputText" class="password-output"></div>
            <div class="actions">
              <button class="btn-primary" id="copyBtn">Copy Password</button>
            </div>
            <div class="status" id="statusMessage"></div>
          </div>
        </div>
      </div>

      <div class="ad-slot">Middle Ad Slot</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Text Dev Tools</div>
  </footer>

  <script>
    const lengthInput = document.getElementById('lengthInput');
    const upperCheck = document.getElementById('upperCheck');
    const lowerCheck = document.getElementById('lowerCheck');
    const numberCheck = document.getElementById('numberCheck');
    const symbolCheck = document.getElementById('symbolCheck');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const outputText = document.getElementById('outputText');
    const statusMessage = document.getElementById('statusMessage');

    const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower = 'abcdefghijklmnopqrstuvwxyz';
    const numbers = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    function setStatus(message, ok = false) {
      statusMessage.textContent = message;
      statusMessage.className = ok ? 'status success' : 'status';
    }

    function generatePassword() {
      const length = Number(lengthInput.value);
      let chars = '';

      if (upperCheck.checked) chars += upper;
      if (lowerCheck.checked) chars += lower;
      if (numberCheck.checked) chars += numbers;
      if (symbolCheck.checked) chars += symbols;

      if (!chars) {
        outputText.textContent = '';
        setStatus('Please select at least one character type.');
        return;
      }

      if (!length || length < 4 || length > 128) {
        outputText.textContent = '';
        setStatus('Please choose a length between 4 and 128.');
        return;
      }

      let result = '';
      const randomValues = new Uint32Array(length);
      crypto.getRandomValues(randomValues);

      for (let i = 0; i < length; i++) {
        result += chars[randomValues[i] % chars.length];
      }

      outputText.textContent = result;
      setStatus('Password generated successfully.', true);
    }

    generateBtn.addEventListener('click', generatePassword);

    clearBtn.addEventListener('click', () => {
      outputText.textContent = '';
      setStatus('');
      lengthInput.value = 16;
      upperCheck.checked = true;
      lowerCheck.checked = true;
      numberCheck.checked = true;
      symbolCheck.checked = true;
    });

    copyBtn.addEventListener('click', async () => {
      if (!outputText.textContent.trim()) {
        setStatus('There is no password to copy yet.');
        return;
      }
      try {
        await navigator.clipboard.writeText(outputText.textContent);
        setStatus('Password copied to clipboard.', true);
      } catch (error) {
        setStatus('Copy failed. Please copy it manually.');
      }
    });
  </script>
</body>
</html>

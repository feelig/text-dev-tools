<!DOCTYPE html>
<html>
<head>
  <title>Base64 Encoder / Decoder</title>
  <meta name="description" content="Encode and decode Base64 text instantly in your browser." />
  <link rel="canonical" href="https://text-dev-tools.pages.dev/tools/base64-encoder/" />
  <meta property="og:title" content="Base64 Encoder / Decoder" />
  <meta property="og:description" content="Encode and decode Base64 text instantly in your browser." />
  <meta property="og:url" content="https://text-dev-tools.pages.dev/tools/base64-encoder/" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:40px;background:#f5f7fb}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:200px;margin-top:10px}
button{margin-top:10px;padding:10px 16px;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h1>Base64 Encoder / Decoder</h1>

<textarea id="input" placeholder="Enter text"></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>
<button onclick="clearText()">Clear</button>

<textarea id="output" placeholder="Result"></textarea>

</div>

<script>

function encode(){
const input=document.getElementById("input").value
document.getElementById("output").value=btoa(input)
}

function decode(){
const input=document.getElementById("input").value
try{
document.getElementById("output").value=atob(input)
}catch(e){
alert("Invalid Base64")
}
}

function clearText(){
document.getElementById("input").value=""
document.getElementById("output").value=""
}

</script>

</body>
</html>

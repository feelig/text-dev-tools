<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <title>URL Encoder / Decoder</title>
  <meta name="description" content="Encode and decode URLs instantly for web development tasks." />
  <link rel="canonical" href="https://text-dev-tools.pages.dev/tools/url-encoder/" />
  <meta property="og:title" content="URL Encoder / Decoder" />
  <meta property="og:description" content="Encode and decode URLs instantly for web development tasks." />
  <meta property="og:url" content="https://text-dev-tools.pages.dev/tools/url-encoder/" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:40px;background:#f5f7fb}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:200px;margin-top:10px}
button{margin-top:10px;padding:10px 16px;font-weight:bold}
</style>
</head>
<body>

<div class="container">

<h1>URL Encoder / Decoder</h1>

<p>Encode or decode URLs instantly.</p>

<textarea id="input" placeholder="Enter text or URL"></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>
<button onclick="clearText()">Clear</button>

<textarea id="output" placeholder="Result"></textarea>

</div>

<script>

function encode(){
const input=document.getElementById("input").value
document.getElementById("output").value=encodeURIComponent(input)
}

function decode(){
const input=document.getElementById("input").value
try{
document.getElementById("output").value=decodeURIComponent(input)
}catch(e){
alert("Invalid encoded URL")
}
}

function clearText(){
document.getElementById("input").value=""
document.getElementById("output").value=""
}

</script>

</body>
</html>

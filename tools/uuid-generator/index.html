<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUID Generator - Free Online Developer Tool</title>
  <meta
    name="description"
    content="Generate UUIDs instantly with this free online UUID generator. Create one or multiple UUID v4 values in your browser."
  />
  <meta name="robots" content="index,follow" />
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #16202a;
      --muted: #5c6773;
      --border: #d9e0e7;
      --primary: #1463ff;
      --primary-hover: #0f52d6;
      --success: #137333;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .container {
      width: min(1000px, calc(100% - 32px));
      margin: 0 auto;
    }
    .site-header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: #fff;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
    }
    .breadcrumb {
      font-size: 14px;
      color: var(--muted);
      margin: 20px 0 8px;
    }
    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    .hero {
      padding: 12px 0 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
    }
    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input[type="number"] {
      width: 100%;
      max-width: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20, 99, 255, 0.12);
    }
    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: #fff;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    .btn-secondary {
      background: #eef3f8;
      color: var(--text);
    }
    .btn-secondary:hover {
      background: #e3ebf4;
    }
    .status {
      margin-top: 12px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    .status.success {
      color: var(--success);
      font-weight: 700;
    }
    .ad-slot {
      display: grid;
      place-items: center;
      min-height: 120px;
      border: 1px dashed #b9c6d3;
      border-radius: 14px;
      color: #7a8794;
      font-size: 14px;
      background: #fbfcfe;
    }
    .site-footer {
      padding: 28px 0 50px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">Text Dev Tools</a>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumb">
      <a href="/">Home</a> / <a href="/developer-tools/">Developer Tools</a> / UUID Generator
    </div>

    <section class="hero">
      <h1>UUID Generator</h1>
      <p>
        Generate one or multiple UUID v4 values instantly in your browser. Useful for databases, APIs, testing, and application development.
      </p>
    </section>

    <section class="grid">
      <div class="ad-slot">Top Ad Slot</div>

      <div class="card">
        <div class="field">
          <label for="countInput">How many UUIDs?</label>
          <input id="countInput" type="number" min="1" max="100" value="5" />
        </div>

        <div class="actions">
          <button class="btn-primary" id="generateBtn">Generate UUIDs</button>
          <button class="btn-secondary" id="clearBtn">Clear</button>
        </div>

        <div class="status" id="statusMessage"></div>

        <div style="margin-top:16px;">
          <textarea id="outputText" placeholder="Generated UUIDs will appear here..."></textarea>
        </div>

        <div class="actions">
          <button class="btn-primary" id="copyBtn">Copy Result</button>
        </div>
      </div>

      <div class="ad-slot">Middle Ad Slot</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Text Dev Tools</div>
  </footer>

  <script>
    const countInput = document.getElementById('countInput');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const outputText = document.getElementById('outputText');
    const statusMessage = document.getElementById('statusMessage');

    function setStatus(message, ok = false) {
      statusMessage.textContent = message;
      statusMessage.className = ok ? 'status success' : 'status';
    }

    function generateUUIDs() {
      const count = Number(countInput.value);

      if (!count || count < 1 || count > 100) {
        outputText.value = '';
        setStatus('Please choose a number between 1 and 100.');
        return;
      }

      const values = [];
      for (let i = 0; i < count; i++) {
        values.push(crypto.randomUUID());
      }

      outputText.value = values.join('\n');
      setStatus('UUIDs generated successfully.', true);
    }

    generateBtn.addEventListener('click', generateUUIDs);

    clearBtn.addEventListener('click', () => {
      countInput.value = 5;
      outputText.value = '';
      setStatus('');
    });

    copyBtn.addEventListener('click', async () => {
      if (!outputText.value.trim()) {
        setStatus('There is no result to copy yet.');
        return;
      }
      try {
        await navigator.clipboard.writeText(outputText.value);
        setStatus('Result copied to clipboard.', true);
      } catch (error) {
        setStatus('Copy failed. Please copy it manually.');
      }
    });
  </script>
</body>
</html>
